name: THD Crawl Shard

on:
  workflow_dispatch:
    inputs:
      num_shards:
        description: 'Number of shards to run'
        required: false
        default: '3'

  schedule:
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      matrix:
        worker: [1, 2, 3, 4, 5]
      fail-fast: false

    steps:
      - name: Checkout with push token
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install curl_cffi

      - name: Configure git for push
        run: |
          git config user.name "oyzh888"
          git config user.email "oyzh888@gmail.com"
          # Verify push works
          git remote -v

      - name: Show IP
        run: curl -s --max-time 5 https://httpbin.org/ip || echo "httpbin timeout"

      - name: Run crawler
        run: python crawler.py --auto --max-shards ${{ github.event.inputs.num_shards || '3' }}

      - name: Show results
        if: always()
        run: |
          echo "=== Links files ==="
          find tasks/links -name "*.jsonl" -exec wc -l {} + 2>/dev/null || echo "No links yet"
          echo "=== Results ==="
          cat tasks/results/*.json 2>/dev/null || echo "No results yet"
